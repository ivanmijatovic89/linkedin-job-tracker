<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#13151f"/>

  <!-- Outer hexagon -->
  <polygon
    points="64,10 108,34 108,82 64,106 20,82 20,34"
    fill="none"
    stroke="#f0a515"
    stroke-width="6"
    stroke-linejoin="round"
  />

  <!-- Inner hexagon fill (subtle) -->
  <polygon
    points="64,22 98,41 98,79 64,98 30,79 30,41"
    fill="#f0a515"
    opacity="0.08"
  />

  <!-- Briefcase body -->
  <rect x="38" y="58" width="52" height="36" rx="5" fill="none" stroke="#f0a515" stroke-width="5" stroke-linejoin="round"/>

  <!-- Briefcase handle -->
  <path d="M52 58 L52 50 Q52 44 58 44 L70 44 Q76 44 76 50 L76 58"
    fill="none" stroke="#f0a515" stroke-width="5" stroke-linejoin="round"/>

  <!-- Center divider line -->
  <line x1="38" y1="72" x2="90" y2="72" stroke="#f0a515" stroke-width="4" opacity="0.6"/>

  <!-- Checkmark -->
  <polyline points="53,72 60,80 76,64"
    fill="none" stroke="#ffffff" stroke-width="5"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.9"/>
</svg>
